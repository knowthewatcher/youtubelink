<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KnowTheWatcher</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        background-color: black;
    }

    .banner-container {
        width: 100vw;
        height: 300px;
        background-color: black;
        display: flex;           /* enables flexbox */
        justify-content: center; /* centers horizontally */
        align-items: center;     /* centers vertically */
    }

    .banner-container img {
        width: 80%;
        height: 80%;
        object-fit: cover;
        display: block;
    }

    .content {
        display: flex;
        justify-content: center;
        padding: 40px 0;
        background-color: black;
    }

    .footer {
        display: flex;
        justify-content: center;
        padding: 30px 0;
        background-color: black;
        color: #777;
    }
</style>
</head>

<body>

<!-- Banner -->
<div class="banner-container">
    <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/banner.png?raw=true" alt="Banner">
</div>

<!-- Video -->
<div class="content">
    <iframe
        src="https://drive.google.com/file/d/11CU1q4ycun6gN3HFzFpmC_FvCyOqjSSx/preview"
        width="640"
        height="480">
    </iframe>
</div>

<!-- Footer -->
<div class="footer">
    <a href="https://youtu.be/a6ECEc1bnZ0?si=Kpu-GkyB28n_bR9P" target="_blank">
        <img
            src="https://lh3.googleusercontent.com/d/1H_RWRjEgGgEHOc5XkjgqG1ND1VTo6Zs8"
            alt="YouTube"
            style="width: 500px; cursor: pointer;">
    </a>
</div>

</body>
</html>
