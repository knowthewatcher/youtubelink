<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KnowTheWatcher</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    background-color: black;
}

/* BACKGROUND CANVASES */
#fog-canvas,
#matrix-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
}

#fog-canvas { z-index: 0; }
#matrix-canvas { z-index: 1; }

/* CONTENT LAYERS */
.banner-container,
.content,
.footer,
.left-panel {
    position: relative;
    z-index: 2;
}

/* BANNER */
.banner-container {
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 50px; /* moves banner down */
}

.banner-container img {
    width: 80%;
    opacity: 0.61;
}

/* VIDEO */
.content {
    display: flex;
    justify-content: center;
    padding: 60px 0; /* space above and below video */
}

/* FOOTER */
.footer {
    display: flex;
    justify-content: center;
    padding: 50px 0; /* space around footer */
    position: relative; /* prevents pseudo-element overlap */
}

.footer::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: -1;
}

/* BOTTOM IMAGE */
.left-panel {
    display: flex;
    justify-content: center;
    margin: 40px 0 80px; /* more spacing above and below */
}

.left-panel img {
    width: 100%;
    max-width: 1200px;
    opacity: 0.7;
}

/* MOBILE */
@media (max-width: 768px) {
    .banner-container { 
        height: 200px; 
        margin-top: 30px; 
    }
    .banner-container img { width: 90%; }
    .content { padding: 40px 0; }
    .content iframe { width: 90%; aspect-ratio: 16/9; }
    .footer { padding: 40px 0; }
    .left-panel { margin: 30px 0 60px; }
}
</style>
</head>

<body>

<canvas id="fog-canvas"></canvas>
<canvas id="matrix-canvas"></canvas>

<div class="banner-container">
    <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/banner4_transparent.png?raw=true">
</div>

<div class="content">
    <iframe src="https://www.youtube.com/embed/1qmQMy_aQW4"
            width="720" height="405" frameborder="0" allowfullscreen></iframe>
</div>

<div class="footer">
    <a href="https://youtu.be/1qmQMy_aQW4" target="_blank">
        <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/Youtubelogo.png?raw=true"
             style="width:500px">
    </a>
</div>

<div class="left-panel">
    <img id="leftImage"
         src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/SolomonsKeyModel.png?raw=true">
</div>

<script>
// ====== BACKGROUND FOG ======
const fog = document.getElementById('fog-canvas');
const ftx = fog.getContext('2d');

function resizeFog() {
    fog.width = window.innerWidth;
    fog.height = window.innerHeight;
}
resizeFog();

let t = 0;

function drawFog() {
    ftx.clearRect(0,0,fog.width,fog.height);

    const grad = ftx.createRadialGradient(
        fog.width/2 + Math.sin(t*0.2)*200,
        fog.height/2 + Math.cos(t*0.15)*200,
        200,
        fog.width/2,
        fog.height/2,
        fog.width
    );

    grad.addColorStop(0, 'rgba(255,0,160,0.08)');
    grad.addColorStop(0.5, 'rgba(0,255,120,0.06)');
    grad.addColorStop(1, 'rgba(0,0,0,0.9)');

    ftx.fillStyle = grad;
    ftx.fillRect(0,0,fog.width,fog.height);

    t += 0.002;
    requestAnimationFrame(drawFog);
}
drawFog();
window.addEventListener('resize', resizeFog);

// ====== MATRIX RAIN ======
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

let fontSize, columns, drops = [];

const letters = (
  'アイウエオカキクケコサシスセソタチツテト' +
  'ナニヌネノハヒフヘホマミムメモ0123456789'
).split('');

function initMatrix() {
    fontSize = window.innerWidth < 768 ? 12 : 16;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = Math.floor(canvas.width / fontSize);
    drops = Array(columns).fill(1);
}
initMatrix();

function drawMatrix() {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
        const char = letters[Math.floor(Math.random() * letters.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        let color = '#0f0';
        const r = Math.random();
        if (r < 0.1) color = '#baffba';
        else if (r < 0.18) color = '#ff33cc';

        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        ctx.fillText(char, x, y);

        if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
    ctx.shadowBlur = 0;
}

setInterval(drawMatrix, 33);
window.addEventListener('resize', initMatrix);

// ====== BOTTOM IMAGE BREATHING ======
const leftImg = document.getElementById('leftImage');
let start = null;
function breathe(ts) {
    if (!start) start = ts;
    const e = (ts - start) / 1000;
    leftImg.style.opacity = 0.3 + 0.2 * Math.sin(e * Math.PI);
    requestAnimationFrame(breathe);
}
requestAnimationFrame(breathe);
</script>

</body>
</html>
