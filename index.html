<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KnowTheWatcher</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    background-color: black;
}

/* Matrix canvas covers entire page behind content */
#matrix-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
}

/* Left-side image panel */
.left-panel img {
    display: block;
    opacity: 0.2; /* starting opacity */
}

/* Banner container */
.banner-container {
    width: 100vw;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2; /* above matrix canvas */
}

.banner-container img {
    width: 80%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
    display: block;
    opacity: 0.85;
}

/* Video content */
.content {
    display: flex;
    justify-content: center;
    padding: 40px 0;
    position: relative;
    z-index: 2;
}

/* Footer */
.footer {
    display: flex;
    justify-content: center;
    padding: 30px 0;
    color: #777;
    position: relative;
    z-index: 2;
}

.footer::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.25);
    z-index: 0;
}

.footer img {
    position: relative;
    z-index: 1;
}

/* Desktop left-panel fixed styling */
@media screen and (min-width: 769px) {
    .left-panel {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1;
        pointer-events: none;
    }

    .left-panel img {
        height: calc(108% * (100vh - 300px));
        width: auto;
        margin-top: 300px;
    }
}

/* Mobile adjustments handled dynamically in JS */
@media screen and (max-width: 768px) {
    .left-panel img {
        width: 95%;             /* bigger image */
        max-height: 60vh;       /* fits below video/footer */
        margin-top: 20px;
        margin-bottom: 40px;
        display: block;
    }

    .banner-container {
        height: 200px;
    }

    .banner-container img {
        width: 90%;
    }

    .content iframe {
        width: 90%;
        height: auto;
        aspect-ratio: 16 / 9;
    }
}
</style>
</head>

<body>

<!-- Matrix Rain Canvas -->
<canvas id="matrix-canvas"></canvas>

<!-- Banner -->
<div class="banner-container">
    <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/banner3_transparent.png?raw=true" alt="Banner">
</div>

<!-- Video -->
<div class="content">
    <iframe 
        src="https://www.youtube.com/embed/1qmQMy_aQW4?si=qPvOqQObVMou__5n" 
        width="720" 
        height="405" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
</div>

<!-- Footer -->
<div class="footer">
    <a href="https://youtu.be/1qmQMy_aQW4?si=2Yu6moiwNxVi6kcx" target="_blank">
        <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/Youtubelogo.png?raw=true"
             alt="YouTube" style="width: 500px; cursor: pointer;">
    </a>
</div>

<!-- Left image -->
<div class="left-panel">
    <img id="leftImage" src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/SolomonsKeyModel.png?raw=true"
         alt="Solomons Key Model">
</div>

<script>
// MATRIX RAIN – classic Matrix-style (katakana + glow)
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

let fontSize;
let columns;
let drops = [];

const letters = (
  'アイウエオカキクケコサシスセソタチツテト' +
  'ナニヌネノハヒフヘホマミムメモヤユヨ' +
  'ラリルレロワヲン0123456789'
).split('');

function initMatrix() {
    fontSize = window.innerWidth < 768 ? 12 : 16;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = Math.floor(canvas.width / fontSize);
    drops = [];
    for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * canvas.height / fontSize;
    }
}

function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
        const char = letters[Math.floor(Math.random() * letters.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;
        ctx.fillStyle = '#baffba';
        ctx.fillText(char, x, y);
        ctx.fillStyle = '#0f0';
        ctx.shadowColor = '#0f0';
        ctx.shadowBlur = 8;
        if (y > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i] += window.innerWidth < 768 ? 1.5 : 1;
    }
    ctx.shadowBlur = 0;
}

// Sinusoidal breathing animation
const leftImg = document.getElementById('leftImage');
let start = null;
function breathe(timestamp) {
    if (!start) start = timestamp;
    const elapsed = (timestamp - start) / 1000;
    leftImg.style.opacity = 0.5 + 0.5 * Math.sin(elapsed * Math.PI); // stronger breathing
    requestAnimationFrame(breathe);
}
requestAnimationFrame(breathe);

// Move left-panel below footer on mobile dynamically
function adjustLeftPanel() {
    const leftPanel = document.querySelector('.left-panel');
    const footer = document.querySelector('.footer');
    if (window.innerWidth <= 768) {
        footer.after(leftPanel);
        leftPanel.style.position = 'relative';
        leftPanel.style.width = '95%';
        leftPanel.style.margin = '20px auto 40px auto';
    } else {
        document.body.prepend(leftPanel);
        leftPanel.style.position = 'fixed';
        leftPanel.style.top = '0';
        leftPanel.style.left = '0';
        leftPanel.style.height = 'calc(108% * (100vh - 300px))';
        leftPanel.style.width = 'auto';
        leftPanel.style.marginTop = '300px';
    }
}

window.addEventListener('load', adjustLeftPanel);
window.addEventListener('resize', adjustLeftPanel);

setInterval(drawMatrix, 33);
window.addEventListener('resize', initMatrix);
initMatrix();
</script>

</body>
</html>
