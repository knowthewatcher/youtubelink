<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KnowTheWatcher</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    background-color: black;
}

/* Matrix canvas covers entire page behind content */
#matrix-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
}

/* Banner container */
.banner-container {
    width: 100vw;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2;
}

.banner-container img {
    width: 80%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
    display: block;
    opacity: 0.61;
}

/* Video content */
.content {
    display: flex;
    justify-content: center;
    padding: 40px 0;
    position: relative;
    z-index: 2;
}

/* Footer */
.footer {
    display: flex;
    justify-content: center;
    padding: 30px 0;
    color: #777;
    position: relative;
    z-index: 2;
}

.footer::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.25);
    z-index: 0;
}

.footer img {
    position: relative;
    z-index: 1;
}

/* Full-page image at the bottom */
.left-panel {
    display: flex;
    justify-content: center;
    width: 100%;
    margin: 20px 0 60px 0;
}

.left-panel img {
    width: 100%;
    max-width: 1200px;
    height: auto;
    display: block;
    opacity: 0.7;
}

/* Mobile adjustments */
@media screen and (max-width: 768px) {
    .banner-container {
        height: 200px;
    }

    .banner-container img {
        width: 90%;
    }

    .content iframe {
        width: 90%;
        height: auto;
        aspect-ratio: 16 / 9;
    }

    .left-panel {
        width: 95%;
        margin: 20px auto 40px auto;
    }
}
</style>
</head>

<body>

<!-- Matrix Rain Canvas -->
<canvas id="matrix-canvas"></canvas>

<!-- Banner -->
<div class="banner-container">
    <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/banner3_transparent.png?raw=true" alt="Banner">
</div>

<!-- Video -->
<div class="content">
    <iframe 
        src="https://www.youtube.com/embed/1qmQMy_aQW4?si=qPvOqQObVMou__5n" 
        width="720" 
        height="405" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
</div>

<!-- Footer -->
<div class="footer">
    <a href="https://youtu.be/1qmQMy_aQW4?si=2Yu6moiwNxVi6kcx" target="_blank">
        <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/Youtubelogo.png?raw=true"
             alt="YouTube" style="width: 500px; cursor: pointer;">
    </a>
</div>

<!-- Full-size image at the bottom -->
<div class="left-panel">
    <img id="leftImage" src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/SolomonsKeyModel.png?raw=true"
         alt="Solomons Key Model">
</div>

<script>
// MATRIX RAIN – mostly green with subtle magenta accents
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

let fontSize;
let columns;
let drops = [];
let columnColors = [];

const letters = (
  'アイウエオカキクケコサシスセソタチツテト' +
  'ナニヌネノハヒフヘホマミムメモヤユヨ' +
  'ラリルレロワヲン0123456789'
).split('');

function initMatrix() {
    fontSize = window.innerWidth < 768 ? 12 : 16;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = Math.floor(canvas.width / fontSize);
    drops = [];
    columnColors = [];
    for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * canvas.height / fontSize;
        columnColors[i] = '#0f0'; // base green
    }
}

function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
        const char = letters[Math.floor(Math.random() * letters.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        // Mostly green, 10% brighter green, 5% subtle magenta
        let color = columnColors[i]; // base green
        const r = Math.random();
        if (r < 0.1) {
            color = '#baffba'; // brighter green
        } else if (r < 0.20) {
            color = '#ff00ff'; // subtle magenta accent
        }

        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;

        ctx.fillText(char, x, y);

        if (y > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i] += window.innerWidth < 768 ? 1.5 : 1;
    }
    ctx.shadowBlur = 0;
}

// Subtle sinusoidal breathing animation for bottom image
const leftImg = document.getElementById('leftImage');
let start = null;
function breathe(timestamp) {
    if (!start) start = timestamp;
    const elapsed = (timestamp - start) / 1000;
    leftImg.style.opacity = 0.6 + 0.2 * Math.sin(elapsed * Math.PI);
    requestAnimationFrame(breathe);
}
requestAnimationFrame(breathe);

setInterval(drawMatrix, 33);
window.addEventListener('resize', initMatrix);
initMatrix();
</script>

</body>
</html>
