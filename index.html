<style>
html, body {
    margin: 0;
    padding: 0;
    background-color: black;
}

/* Banner container now flex + responsive */
.banner-container {
    width: 100vw;
    height: 300px; /* default height for desktop */
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Banner image responsive */
.banner-container img {
    width: 80%;
    height: auto; /* maintain aspect ratio */
    max-height: 100%;
    object-fit: contain; /* scales without cropping */
    display: block;
}

/* Video content */
.content {
    display: flex;
    justify-content: center;
    padding: 40px 0;
    background-color: black;
}

/* Footer */
.footer {
    display: flex;
    justify-content: center;
    padding: 30px 0;
    background-color: black;
    color: #777;
}

/* Mobile-specific adjustments */
@media screen and (max-width: 768px) {
    .banner-container {
        height: 200px; /* shorter height on mobile */
    }
    .banner-container img {
        width: 90%; /* slightly bigger on mobile */
    }
}
</style>
