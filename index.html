<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KnowTheWatcher</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: auto; /* allow scrolling */
    background-color: black;
}

/* Matrix canvas covers entire page behind content */
#matrix-canvas {
    position: fixed; /* stays behind content while scrolling */
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
}

/* Banner container */
.banner-container {
    width: 100vw;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1;
}

/* Banner image responsive */
.banner-container img {
    width: 80%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
    display: block;
}

/* Video content */
.content {
    display: flex;
    justify-content: center;
    padding: 40px 0;
    position: relative;
    z-index: 1;
}

/* Footer */
.footer {
    display: flex;
    justify-content: center;
    padding: 30px 0;
    color: #777;
    position: relative;
    z-index: 1;
}

/* Mobile adjustments */
@media screen and (max-width: 768px) {
    .banner-container {
        height: 200px;
    }
    .banner-container img {
        width: 90%;
    }

    .content iframe {
        width: 90%;
        height: auto;
        aspect-ratio: 16 / 9;
    }
}
</style>
</head>

<body>

<!-- Matrix Rain Canvas -->
<canvas id="matrix-canvas"></canvas>

<!-- Banner -->
<div class="banner-container">
    <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/banner2.png?raw=true" alt="Banner">
</div>

<!-- Video -->
<div class="content">
    <iframe 
        src="https://youtu.be/bh3boI93Sfw?si=0B_wIpt9WDG9rKCa" 
        width="640" 
        height="360" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
</div>

<!-- Footer -->
<div class="footer">
    <a href="https://youtu.be/bh3boI93Sfw?si=0B_wIpt9WDG9rKCa" target="_blank">
        <img
            src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/Youtubelogo.png?raw=true"
            alt="YouTube"
            style="width: 500px; cursor: pointer;">
    </a>
</div>

<script>
// MATRIX RAIN (1s and 0s) - Mobile-Friendly with scrolling
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

let fontSize;
let columns;
let drops = [];

function initMatrix() {
    // Adjust font size based on screen width
    fontSize = window.innerWidth < 768 ? 12 : 16;

    // Full canvas size
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Recalculate columns and drops
    columns = Math.floor(canvas.width / fontSize);
    drops = [];
    for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * canvas.height / fontSize;
    }
}

// 1s and 0s
const letters = '01'.split('');

// Draw function
function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)'; // fading trail effect
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#0F0';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        // Reset drop after it passes screen
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        // Slightly faster drop on small screens
        drops[i] += window.innerWidth < 768 ? 1.5 : 1;
    }
}

// Animate
setInterval(draw, 33);

// Reinitialize on resize
window.addEventListener('resize', initMatrix);

// Initialize
initMatrix();
</script>

</body>
</html>
