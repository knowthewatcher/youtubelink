<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KnowTheWatcher</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    background-color: black;
}

/* Matrix canvas covers entire page behind content */
#matrix-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
}

/* Left-side image panel */
.left-panel {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1; /* above matrix canvas */
    pointer-events: none;
}

.left-panel img {
    height: calc(108% * (100vh - 300px));
    width: auto;
    display: block;
    margin-top: 300px;
    animation: breathe 5s ease-in-out infinite;
}

/* Smooth breathing animation */
@keyframes breathe {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 1; }
}

/* Banner container */
.banner-container {
    width: 100vw;
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 2; /* above left panel */
}

.banner-container img {
    width: 80%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
    display: block;
    opacity: 0.85;
}

/* Video content */
.content {
    display: flex;
    justify-content: center;
    padding: 40px 0;
    position: relative;
    z-index: 2;
}

/* Footer */
.footer {
    display: flex;
    justify-content: center;
    padding: 30px 0;
    color: #777;
    position: relative;
    z-index: 2;
}

.footer::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.25);
    z-index: 0;
}

.footer img {
    position: relative;
    z-index: 1;
}

/* Mobile adjustments */
@media screen and (max-width: 768px) {
    /* Move left image above video and scale it */
    .left-panel {
        position: relative;
        top: auto;
        left: auto;
        margin: 20px auto 0 auto;
        width: 90%;
        height: auto;
        z-index: 2;
    }

    .left-panel img {
        width: 100%;
        height: auto;
        margin-top: 0;
        animation: breathe 5s ease-in-out infinite;
    }

    .banner-container {
        height: 200px;
    }

    .banner-container img {
        width: 90%;
    }

    .content iframe {
        width: 90%;
        height: auto;
        aspect-ratio: 16 / 9;
    }
}
</style>
</head>

<body>

<!-- Left-side image panel -->
<div class="left-panel">
    <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/SolomonsKeyModel.png?raw=true" alt="Solomons Key Model">
</div>

<!-- Matrix Rain Canvas -->
<canvas id="matrix-canvas"></canvas>

<!-- Banner -->
<div class="banner-container">
    <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/banner3_transparent.png?raw=true" alt="Banner">
</div>

<!-- Video -->
<div class="content">
    <iframe 
        src="https://www.youtube.com/embed/1qmQMy_aQW4?si=qPvOqQObVMou__5n" 
        width="720" 
        height="405" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
</div>

<!-- Footer -->
<div class="footer">
    <a href="https://youtu.be/1qmQMy_aQW4?si=2Yu6moiwNxVi6kcx" target="_blank">
        <img
            src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/Youtubelogo.png?raw=true"
            alt="YouTube"
            style="width: 500px; cursor: pointer;">
    </a>
</div>

<script>
// MATRIX RAIN – classic Matrix-style (katakana + glow)
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

let fontSize;
let columns;
let drops = [];

const letters = (
  'アイウエオカキクケコサシスセソタチツテト' +
  'ナニヌネノハヒフヘホマミムメモヤユヨ' +
  'ラリルレロワヲン0123456789'
).split('');

function initMatrix() {
    fontSize = window.innerWidth < 768 ? 12 : 16;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    columns = Math.floor(canvas.width / fontSize);
    drops = [];
    for (let i = 0; i < columns; i++) {
        drops[i] = Math.random() * canvas.height / fontSize;
    }
}

function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
        const char = letters[Math.floor(Math.random() * letters.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        ctx.fillStyle = '#baffba';
        ctx.fillText(char, x, y);

        ctx.fillStyle = '#0f0';
        ctx.shadowColor = '#0f0';
        ctx.shadowBlur = 8;

        if (y > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i] += window.innerWidth < 768 ? 1.5 : 1;
    }

    ctx.shadowBlur = 0;
}

setInterval(draw, 33);
window.addEventListener('resize', initMatrix);
initMatrix();
</script>

</body>
</html>
