<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KnowTheWatcher</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background-color: black;
    overflow: hidden;
}

/* Full-screen Matrix canvas behind everything */
#matrix-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

/* Banner container */
.banner-container {
    width: 100vw;
    height: 300px;
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1;
}

/* Banner image responsive */
.banner-container img {
    width: 80%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
    display: block;
}

/* Video content */
.content {
    display: flex;
    justify-content: center;
    padding: 40px 0;
    background-color: black;
    position: relative;
    z-index: 1;
}

/* Footer */
.footer {
    display: flex;
    justify-content: center;
    padding: 30px 0;
    background-color: black;
    color: #777;
    position: relative;
    z-index: 1;
}

/* Mobile-specific adjustments */
@media screen and (max-width: 768px) {
    .banner-container {
        height: 200px;
    }
    .banner-container img {
        width: 90%;
    }

    .content iframe {
        width: 90%;
        height: auto;
        aspect-ratio: 16 / 9;
    }
}
</style>
</head>

<body>

<!-- Matrix Rain Canvas -->
<canvas id="matrix-canvas"></canvas>

<!-- Banner -->
<div class="banner-container">
    <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/banner2.png?raw=true" alt="Banner">
</div>

<!-- Video -->
<div class="content">
    <iframe 
        src="https://www.youtube.com/embed/3RXQ1a4hz18" 
        width="640" 
        height="360" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
</div>

<!-- Footer -->
<div class="footer">
    <a href="https://www.youtube.com/embed/3RXQ1a4hz18" target="_blank">
        <img
            src="https://lh3.googleusercontent.com/d/1H_RWRjEgGgEHOc5XkjgqG1ND1VTo6Zs8"
            alt="YouTube"
            style="width: 500px; cursor: pointer;">
    </a>
</div>

<script>
// Matrix Rain (1s and 0s)
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Only 1s and 0s
const letters = '01'.split('');
const fontSize = 16;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];

for (let i = 0; i < columns; i++) {
    drops[i] = Math.random() * canvas.height;
}

function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#0F0';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 33);

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
