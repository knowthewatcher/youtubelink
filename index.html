<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KnowTheWatcher</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background-color: black;
}

/* Banner container */
.banner-container {
    width: 100vw;
    height: 300px; /* default desktop height */
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Banner image responsive */
.banner-container img {
    width: 80%;
    height: auto; /* maintain aspect ratio */
    max-height: 100%;
    object-fit: contain; /* scales without cropping */
    display: block;
}

/* Video content */
.content {
    display: flex;
    justify-content: center;
    padding: 40px 0;
    background-color: black;
}

/* Footer */
.footer {
    display: flex;
    justify-content: center;
    padding: 30px 0;
    background-color: black;
    color: #777;
}

/* Mobile-specific adjustments */
@media screen and (max-width: 768px) {
    .banner-container {
        height: 200px; /* shorter height on phones */
    }
    .banner-container img {
        width: 90%; /* slightly bigger on smaller screens */
    }

    .content iframe {
        width: 90%;  /* make video fit smaller screens */
        height: auto;
        aspect-ratio: 16 / 9; /* maintain 16:9 ratio */
    }
}
</style>
</head>

<body>

<!-- Banner -->
<div class="banner-container">
    <img src="https://github.com/NaSTyNiCK562/youtubelink/blob/main/banner.png?raw=true" alt="Banner">
</div>

<!-- Video -->
<div class="content">
    <iframe 
        src="https://www.youtube.com/embed/3RXQ1a4hz18" 
        width="640" 
        height="360" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
</div>

<!-- Footer -->
<div class="footer">
    <a href="https://youtu.be/a6ECEc1bnZ0?si=Kpu-GkyB28n_bR9P" target="_blank">
        <img
            src="https://lh3.googleusercontent.com/d/1H_RWRjEgGgEHOc5XkjgqG1ND1VTo6Zs8"
            alt="YouTube"
            style="width: 500px; cursor: pointer;">
    </a>
</div>

</body>
</html>
